{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">Eliminar Suscripción</h3>
            </div>
            <div class="card-body">
                <p>¿Estás seguro de que deseas eliminar la suscripción recurrente de <strong>{{ object.customer }}</strong> para el producto <strong>{{ object.product.name }}</strong>?</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">Sí, Eliminar</button>
                        <a href="{% url 'recurring_order_list' %}" class="btn btn-secondary btn-lg">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
